<style>
:root { --bg:#10141F; --panel:#1B2340; --panel2:#232C4E; --line:#2E3859; --txt:#E8ECF5; --mut:#8A93AD; --blue:#7FB0EE; --green:#56C79A; --red:#C7433A; --gold:#E8C468; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; background:var(--bg); color:var(--txt); font-family:'Avenir Next','Segoe UI',system-ui,sans-serif; padding-bottom:74px; }
header { padding:14px 14px 6px; max-width:760px; margin:0 auto; }
h1 { font-size:19px; margin:0; font-weight:600; }
h1 small { color:var(--red); font-weight:600; }
main { padding:0 14px; max-width:760px; margin:0 auto; }
.card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
.card.hpro { background:linear-gradient(135deg, rgba(127,176,238,.18), rgba(127,176,238,0) 55%) , var(--panel); border-left:3px solid var(--blue); }
.card.hper { background:linear-gradient(135deg, rgba(86,199,154,.18), rgba(86,199,154,0) 55%) , var(--panel); border-left:3px solid var(--green); }
.fiche-pro .sec { color:var(--blue); }
.fiche-per .sec { color:var(--green); }
.mapcard { padding:6px; }
.card h2 { font-size:17px; margin:0; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.tag { font-size:10px; letter-spacing:.08em; padding:3px 8px; border-radius:6px; font-weight:700; }
.tag.pro { background:rgba(127,176,238,.18); color:var(--blue); }
.tag.perso { background:rgba(86,199,154,.18); color:var(--green); }
.tag.archive { background:rgba(138,147,173,.18); color:var(--mut); }
.dates { color:var(--gold); font-size:13px; margin:6px 0 8px; font-weight:600; }
.brief { font-size:13.5px; line-height:1.5; margin:6px 0; }
.sec { margin:16px 0 6px; font-size:12.5px; font-weight:700; color:var(--mut); letter-spacing:.06em; text-transform:uppercase; display:flex; justify-content:space-between; align-items:baseline; }
.sec .cnt { font-weight:400; font-size:12px; text-transform:none; color:var(--mut); }
label.f { display:block; font-size:11px; color:var(--mut); letter-spacing:.06em; text-transform:uppercase; margin:12px 0 4px; }
textarea, input.f, select.f { width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--txt); padding:9px 10px; font-size:14px; font-family:inherit; outline:none; resize:vertical; }
.hotellink { display:inline-block; margin-top:7px; color:var(--green); font-size:13.5px; text-decoration:none; font-weight:600; }
.train { display:flex; gap:10px; align-items:flex-start; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px; margin:8px 0; }
.train .badge { flex:0 0 auto; background:var(--blue); color:#0E1526; font-weight:700; font-size:12.5px; padding:5px 10px; border-radius:7px; margin-top:1px; }
.train.critique .badge { background:var(--red); color:#fff; }
.train .tr { font-size:14px; font-weight:600; line-height:1.35; }
.train .tn { font-size:12.5px; color:var(--mut); margin-top:2px; line-height:1.4; }
.navibtn { display:block; text-align:center; margin-top:10px; background:var(--panel2); border:1px solid var(--blue); color:var(--blue); border-radius:9px; padding:10px; font-size:13.5px; text-decoration:none; font-weight:600; }
.taq { border-left:3px solid var(--gold); padding:8px 10px; margin:8px 0; background:var(--panel2); border-radius:0 10px 10px 0; }
.taq .route { font-weight:700; font-size:14px; }
.taq .d { font-size:12.5px; color:var(--mut); margin:3px 0; }
.taq .d b { color:var(--gold); font-weight:600; }
.taq .chk { display:flex; gap:16px; margin-top:6px; font-size:13px; align-items:center; flex-wrap:wrap; }
.taq .chk label { display:flex; gap:6px; align-items:center; }
input[type=checkbox] { width:19px; height:19px; accent-color:var(--green); flex:0 0 auto; }
.taq input.no { width:110px; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--txt); padding:4px 7px; font-size:12.5px; font-family:inherit; }
.li { display:flex; gap:10px; align-items:center; padding:8px 2px; border-bottom:1px solid var(--line); }
.li:last-child { border-bottom:none; }
.li span { flex:1; font-size:14.5px; line-height:1.35; }
.li.done span { color:var(--mut); text-decoration:line-through; }
.li .x { background:none; border:none; color:var(--mut); font-size:15px; cursor:pointer; }
.li .dl { font-size:11.5px; color:var(--mut); white-space:nowrap; }
.li .dl.soon { color:var(--gold); font-weight:700; }
.li .dl.late { color:var(--red); font-weight:700; }
.addrow { display:flex; gap:8px; margin-top:10px; }
.addrow input, .addrow select { flex:1; background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--txt); padding:9px 10px; font-size:14px; font-family:inherit; outline:none; min-width:0; }
.addrow button { background:var(--green); border:none; color:#0E1526; font-weight:700; border-radius:8px; padding:0 16px; font-size:18px; cursor:pointer; }
.poi { display:flex; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line); align-items:flex-start; }
.poi:last-child { border-bottom:none; }
.poi .body { flex:1; min-width:0; }
.poi a { color:var(--txt); text-decoration:none; font-size:14.5px; line-height:1.35; display:block; }
.poi .note { color:var(--mut); font-size:12.5px; line-height:1.4; margin-top:2px; }
.poi.done a { color:var(--mut); text-decoration:line-through; }
.mynote { color:var(--gold); font-size:12.5px; margin-top:3px; white-space:pre-wrap; }
.nbtn { flex:0 0 auto; background:none; border:none; color:var(--mut); font-size:16px; cursor:pointer; padding:2px 4px; }
.back { background:none; border:none; color:var(--blue); font-size:14px; cursor:pointer; padding:8px 0; font-family:inherit; font-weight:600; }
.destgrid { display:flex; flex-wrap:wrap; gap:8px; }
.destgrid button { padding:8px 12px; border-radius:999px; font-size:13px; border:1px solid var(--line); background:var(--panel2); color:var(--txt); cursor:pointer; font-family:inherit; }
.destgrid button.pro { border-color:rgba(127,176,238,.5); }
.destgrid button.perso { border-color:rgba(86,199,154,.5); }
.cal { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal .hd { text-align:center; font-size:11px; color:var(--mut); font-weight:700; padding:2px 0; }
.cal .day { min-height:54px; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#0E1526; cursor:pointer; border:2px solid transparent; padding:3px 1px; text-align:center; }
.cal .day small { font-size:7.5px; font-weight:700; opacity:.8; line-height:1.15; word-break:break-word; }
.cal .day.now { border-color:var(--gold); box-shadow:0 0 0 2px rgba(232,196,104,.35); }
.cal .blank { min-height:10px; }
.stp { display:flex; gap:10px; align-items:flex-start; padding:5px 0; }
.stp .ic { width:32px; height:32px; border-radius:50%; background:var(--panel2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:15px; flex:0 0 auto; }
.stp .tx { font-size:14px; line-height:1.4; padding-top:6px; flex:1; }
.chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; }
.chp { font-size:12.5px; padding:7px 10px; border-radius:9px; background:var(--panel2); border:1px solid var(--line); color:var(--txt); cursor:pointer; font-family:inherit; text-align:left; }
.chp b { color:var(--gold); font-weight:700; }
.tbadge { display:inline-block; background:rgba(232,196,104,.14); color:var(--gold); font-weight:700; font-size:12.5px; padding:5px 10px; border-radius:8px; margin-left:8px; }
.pill { display:inline-block; color:#0E1526; border:none; border-radius:999px; padding:6px 13px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
.row2 { display:flex; gap:8px; }
.row2 > div { flex:1; }
.tel { display:inline-block; margin-top:6px; color:var(--blue); font-size:14px; text-decoration:none; font-weight:600; }
.phr { padding:8px 0; border-bottom:1px solid var(--line); }
.phr:last-child { border-bottom:none; }
.phr .jp { font-size:15px; }
.phr .ro { font-size:12.5px; color:var(--gold); }
.phr .fr { font-size:12.5px; color:var(--mut); }
.tot { display:flex; justify-content:space-between; font-size:14px; padding:6px 0; border-bottom:1px solid var(--line); }
.tot.big { font-weight:700; font-size:15.5px; color:var(--gold); border-bottom:none; }
footer { position:fixed; bottom:0; left:0; right:0; background:var(--panel); border-top:1px solid var(--line); display:flex; gap:4px; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); justify-content:space-around; z-index:10; }
footer button { background:none; border:none; color:var(--txt); border-radius:9px; padding:6px 8px; font-size:19px; cursor:pointer; font-family:inherit; line-height:1; }

#status { position:fixed; bottom:64px; left:50%; transform:translateX(-50%); background:var(--green); color:#0E1526; font-size:12.5px; font-weight:600; padding:6px 14px; border-radius:99px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:20; }
.empty { color:var(--mut); text-align:center; padding:20px 0; font-size:14px; }
details.far { margin-top:14px; }

.adr { display:block; margin-top:7px; color:var(--green); font-size:13px; line-height:1.45; word-break:break-word; text-decoration:none; font-weight:600; }
.swipehint { text-align:center; color:var(--mut); font-size:11px; margin:-4px 0 8px; letter-spacing:.05em; }
.subh { margin:12px 0 2px; font-size:12px; font-weight:700; color:var(--gold); letter-spacing:.04em; }
.qrgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }

.spgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px; }

.sessbar b { color:var(--green); }
.sessbtn { background:var(--red); color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
.sessbtn.go { background:var(--green); color:#0E1526; }

#capov .em { font-size:34px; text-align:center; display:block; }
#capov h3 { text-align:center; margin:4px 0 14px; }
.gpsrow { display:flex; gap:8px; align-items:center; }
.gpsrow input { flex:1; }
.gpsbtn { background:var(--panel2); border:1px solid var(--blue); color:var(--blue); border-radius:8px; padding:9px 12px; font-size:13px; font-family:inherit; }
.catchli { background:var(--panel2); border-radius:10px; padding:10px; margin-bottom:8px; }
.catchli .top { display:flex; justify-content:space-between; align-items:baseline; }
.catchli .esp { font-weight:700; font-size:14.5px; }
.catchli .meta { font-size:12px; color:var(--mut); margin-top:3px; }

.thumb { width:100%; border-radius:8px; margin-top:8px; max-height:180px; object-fit:cover; }
.zonebadge { display:inline-block; margin-top:6px; font-size:11.5px; color:var(--gold); background:rgba(232,196,104,.12); padding:3px 8px; border-radius:6px; }
.catchli img { width:56px; height:56px; object-fit:cover; border-radius:8px; flex:0 0 auto; }
.catchli .row { display:flex; gap:10px; }
svg .hit { cursor:pointer; }
@media (prefers-reduced-motion: no-preference) {
@keyframes draw { from { stroke-dashoffset:1; } to { stroke-dashoffset:0; } }
@keyframes pop { from { opacity:0; transform:scale(.2); } to { opacity:1; transform:scale(1); } }
@keyframes twinkle { 0%,100% { opacity:.15; } 50% { opacity:.8; } }
.rp { stroke-dasharray:1; animation:draw 2s ease .3s both; }
.rq { stroke-dasharray:1; animation:draw 2.4s ease 2.2s both; }
.n { transform-box:fill-box; transform-origin:center; animation:pop .5s cubic-bezier(.34,1.56,.64,1) both; }
.star { animation:twinkle 3.2s ease-in-out infinite; }
}

function nearestPref(lat,lng){
  let best=null,bd=1e9;
  for(const p of PREF_JP){ const d=(p[2]-lat)**2+(p[3]-lng)**2; if(d<bd){bd=d;best=p;} }
  return best? {pref:best[0],region:best[1]} : null;
}
function parseGPS(s){ const m=(s||'').match(/(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)/); return m?{lat:+m[1],lng:+m[2]}:null; }
function zoneLabel(gps){ const c=parseGPS(gps); if(!c) return ''; const z=nearestPref(c.lat,c.lng); return z? z.pref+' · '+z.region : ''; }

let _tx=null,_ty=null,_locked=false;
document.addEventListener('touchstart',e=>{ _tx=e.touches[0].clientX; _ty=e.touches[0].clientY; _locked=false; },{passive:true});
document.addEventListener('touchmove',e=>{
  if(_tx===null||view.page!=='dest') return;
  const dx=e.touches[0].clientX-_tx, dy=e.touches[0].clientY-_ty;
  if(!_locked && Math.abs(dx)<10 && Math.abs(dy)<10) return;
  if(!_locked) _locked = Math.abs(dx) > Math.abs(dy)*1.3;
  if(_locked){
    e.preventDefault();
    const m=document.getElementById('main');
    if(m) m.style.transform = `translateX(${dx*0.55}px)`, m.style.opacity = 1-Math.min(Math.abs(dx)/400,.35);
  }
},{passive:false});
document.addEventListener('touchend',e=>{
  const m=document.getElementById('main');
  if(m){ m.style.transition='transform .2s ease, opacity .2s ease'; m.style.transform=''; m.style.opacity=''; setTimeout(()=>{ if(m) m.style.transition=''; },220); }
  if(_tx===null||view.page!=='dest'||!_locked){ _tx=null; return; }
  const dx=e.changedTouches[0].clientX-_tx;
  if(Math.abs(dx)>55){
    const di = view.di ?? firstDay(view.dest);
    openDestDay(di + (dx<0?1:-1));
  }
  _tx=null; _locked=false;
},{passive:true});

function poiSections(d, cats, far){
  const items = d.pois.filter(p=>(far?p.f:!p.f));
  if(!items.length) return '';

    const it=items.filter(p=>p.c===c);
    const done=it.filter(p=>state.checks[p.id]).length;
    let body='';
    if(c==='🍜 Restaurants'){
      const subs=[...new Set(it.map(p=>p.sc||'🍽️ À découvrir'))].sort();
      body=subs.map(s=>`<div class="subh">${esc(s)}</div>`+it.filter(p=>(p.sc||'🍽️ À découvrir')===s).map(poiRow).join('')).join('');

    return `<div class="sec">${esc(c)} <span class="cnt">${done}/${it.length}</span></div>`+body;

}

function readPhoto(file, cb){
  const img=new Image(); const rd=new FileReader();
  rd.onload=()=>{ img.onload=()=>{
    const M=1000, k=Math.min(1, M/Math.max(img.width,img.height));
    const cv=document.createElement('canvas'); cv.width=img.width*k; cv.height=img.height*k;
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    cb(cv.toDataURL('image/jpeg',0.82));
  }; img.src=rd.result; };
  rd.readAsDataURL(file);
}

function previewPhoto(ev){
  const f=ev.target.files[0]; if(!f) return;
  readPhoto(f, data=>{ const im=document.getElementById('cap_thumb'); im.src=data; im.style.display='block'; im.dataset.data=data; });
}
function findCatch(ref){ const s=(state.sessions||[]).find(x=>x.id===ref.sessId); if(!s) return null; return {c:s.catches[ref.idx], sessId:ref.sessId, idx:ref.idx}; }
function deleteCatch(ref){
  const s=(state.sessions||[]).find(x=>x.id===ref.sessId); if(s) s.catches.splice(ref.idx,1);
  document.getElementById('capov')?.remove(); scheduleSave(); render(); flash('Prise supprimée');
}
function confirmCatch(esp, editRef){
  const g=id=>document.getElementById(id)?.value.trim()||'';
  const thumb=document.getElementById('cap_thumb');
  const photo = thumb && thumb.dataset.data ? thumb.dataset.data : (editRef ? (findCatch(editRef)||{}).c?.photo : null);
  const sel=document.getElementById('cap_sessel');
  let sessId = sel ? sel.value : (state.activeSession || (editRef&&editRef.sessId));
  const gps=g('cap_gps');
  const data={esp,tl:g('cap_tl'),lr:g('cap_lr'),gps,photo:photo||null,zone:zoneLabel(gps)};
  if(editRef){
    const s=(state.sessions||[]).find(x=>x.id===editRef.sessId);
    if(sessId!=='__new__' && String(sessId)!==String(editRef.sessId)){
      // déplacer vers une autre session
      if(s) s.catches.splice(editRef.idx,1);
      const ns=(state.sessions||[]).find(x=>String(x.id)===String(sessId));
      if(ns) ns.catches.unshift(Object.assign({d:new Date().toISOString(),spot:ns.spot},data));
    } else if(s){ Object.assign(s.catches[editRef.idx], data); }
  } else {
    if(sessId==='__new__'){ startSession(); sessId=state.activeSession; }
    const s=(state.sessions||[]).find(x=>String(x.id)===String(sessId));
    if(s) s.catches.unshift(Object.assign({d:new Date().toISOString(),spot:s.spot},data));
  }
  document.getElementById('capov')?.remove();
  scheduleSave(); render(); flash(esp+' enregistré 🎣');
}
function renderCatch(){
  const sess=state.sessions||[];
  const active=sess.find(x=>x.id===state.activeSession);
  const allCatches = sess.flatMap(s=>s.catches.map((c,idx)=>({...c,sessId:s.id,idx,spot:c.spot||s.spot})));
  document.getElementById('main').innerHTML =
   `<button class="back" onclick="goHome()">← Accueil</button>
    <div class="card">
      ${active?`<div class="sessbar"><span>🎣 Session en cours <b>${fmtDur(new Date()-new Date(active.start))}</b>${active.spot?' · '+esc(active.spot):''}</span><button class="sessbtn" onclick="endSession()">⏹ Terminer</button></div>`
       :`<div class="sessbar" style="background:var(--panel2);border-color:var(--line)"><span style="color:var(--mut)">Aucune session active</span><button class="sessbtn go" onclick="startSession()">▶ Démarrer</button></div>`}
      <div class="sec">Prise rapide <span class="cnt">touche pour ajouter — pendant ou après coup</span></div>
      <div class="spgrid">${SPECIES.map(sp=>`<button class="spbtn" onclick='openCapture(${JSON.stringify(sp)})'><span class="em">${sp[0]}</span><span class="lb">${esc(sp[1])}</span></button>`).join('')}</div>
    </div>
    <div class="card"><div class="sec">Carnet <span class="cnt">${allCatches.length} prise${allCatches.length>1?'s':''} · ${sess.length} session${sess.length>1?'s':''}</span></div>
      ${allCatches.length?allCatches.map(x=>`<div class="catchli" onclick='openCapture(${JSON.stringify(SPECIES.find(sp=>sp[1]===x.esp)||["❓",x.esp])},${JSON.stringify({sessId:x.sessId,idx:x.idx})})'>
        <div class="row">
          ${x.photo?`<img src="${x.photo}">`:''}
          <div style="flex:1">
            <div class="top"><span class="esp">${esc(x.esp)}${x.tl?' · '+esc(x.tl)+' cm':''}</span></div>
            <div class="meta">${esc(x.lr||'—')}${x.spot?' · '+esc(x.spot):''}<br>${new Date(x.d).toLocaleString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
            ${x.zone||x.gps?`<div class="zonebadge">🗾 ${esc(x.zone||zoneLabel(x.gps))}</div>`:''}
          </div>
        </div>
      </div>`).join(''):'<div class="empty">Aucune prise... pour l\u2019instant 🎏</div>'}
      ${sess.length?`<div class="addrow"><button style="flex:1;padding:10px" onclick="exportCSV()">⬇ Export CSV (analyse)</button></div>`:''}
    </div>`;
}
function exportCSV(){
  const rows=[['date','session_id','session_debut','session_duree_min','spot','prefecture','region','espece','taille_cm','leurre','gps','photo_incluse']];
  (state.sessions||[]).forEach(s=>{
    const dur = s.end? Math.round((new Date(s.end)-new Date(s.start))/60000) : '';
    s.catches.forEach(c=>{
      const z=(c.zone||zoneLabel(c.gps)||' · ').split(' · ');
      rows.push([c.d,s.id,s.start,dur,c.spot||s.spot||'',z[0]||'',z[1]||'',c.esp,c.tl,c.lr,c.gps,c.photo?'oui':'non']);
    });
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='captures_japon_2026.csv'; a.click();
}
function renderBudget(){
  const isT = view.bt==='T';
  const b=budgetAcct(); const rate=b.rate||165;
  const tot=b.items.reduce((s,x)=>s+(+x.y||0),0);
  const bycat=BCATS.map(c=>[c,b.items.filter(x=>x.c===c).reduce((s,x)=>s+(+x.y||0),0)]).filter(x=>x[1]>0);
  // total hôtels perso déjà payés (info)
  const hotelsPaid = isT ? 0 : 1312.95;
  document.getElementById('main').innerHTML =
   `<button class="back" onclick="goHome()">← Accueil</button>
    <div class="card" style="display:flex;gap:8px;padding:8px">
      <button class="pill" style="flex:1;background:${isT?'var(--panel2)':'var(--green)'};color:${isT?'var(--txt)':'#0E1526'}" onclick="view.bt='';render()">🏖️ Perso</button>
      <button class="pill" style="flex:1;background:${isT?'var(--blue)':'var(--panel2)'};color:${isT?'#0E1526':'var(--txt)'}" onclick="view.bt='T';render()">💼 Travail</button>
    </div>
    <div class="card ${isT?'hpro':'hper'}"><div class="sec">💴 Budget ${isT?'Travail':'Perso'}</div>
      <div class="row2"><div><label class="f">Taux ¥ / €</label><input class="f" inputmode="decimal" value="${rate}" onchange="budgetAcct().rate=+this.value||165;scheduleSave();render()"></div>
      <div><label class="f">Total dépenses</label><div style="padding-top:9px;font-size:16px;font-weight:700;color:var(--gold)">${tot.toLocaleString()} ¥ ≈ ${(tot/rate).toFixed(0)} €</div></div></div>
      ${!isT?`<div class="tot"><span>🏨 Hôtels perso (payés d'avance)</span><span>${hotelsPaid.toLocaleString('fr-FR')} €</span></div>`:''}
      ${bycat.map(x=>`<div class="tot"><span>${x[0]}</span><span>${x[1].toLocaleString()} ¥ · ${(x[1]/rate).toFixed(0)} €</span></div>`).join('')}
      ${!isT?`<div class="tot big"><span>Total perso engagé</span><span>≈ ${(hotelsPaid + tot/rate).toFixed(0)} €</span></div>`:(tot?`<div class="tot big"><span>Total travail</span><span>≈ ${(tot/rate).toFixed(0)} €</span></div>`:'')}
    </div>
    <div class="card"><div class="sec">Ajouter une dépense ${isT?'travail':'perso'}</div>
      <div class="addrow"><input id="by" inputmode="numeric" placeholder="¥" style="flex:1"><select id="bc" class="f" style="flex:1.4">${BCATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="addrow"><input id="bn" placeholder="Note (optionnel)" style="flex:2"><button onclick="addExp()">+</button></div>
    </div>
    <div class="card">
      ${b.items.length?b.items.map((x,j)=>`<div class="li"><span>${(+x.y).toLocaleString()} ¥ — ${esc(x.c)}${x.n?' · '+esc(x.n):''}<br><small style="color:var(--mut)">${new Date(x.d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</small></span><button class="x" onclick="budgetAcct().items.splice(${j},1);scheduleSave();render()">✕</button></div>`).join(''):'<div class="empty">Aucune dépense</div>'}
    </div>`;
}
function addExp(){
  const y=+document.getElementById('by').value; if(!y){ flash('Montant ?'); return; }
  budgetAcct().items.unshift({d:new Date().toISOString(),y,c:document.getElementById('bc').value,n:document.getElementById('bn').value.trim()});
  scheduleSave(); render();
}

    </div>`;

function renderSearch(){
  const q=view.q.trim().toLowerCase();
  let rows=[];
  DATA.forEach(d=>d.pois.forEach(p=>{ if((p.t+' '+p.n+' '+d.label).toLowerCase().includes(q)) rows.push({d,p}); }));
  document.getElementById('main').innerHTML =
    `<button class="back" onclick="goHome()">← Accueil</button>
     <div class="card"><input id="search2" value="${esc(view.q)}" placeholder="🔎 Rechercher..." oninput="doSearch(this.value)" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:11px 12px;font-size:15px;outline:none;font-family:inherit"></div>
     <div class="card"><h2>${rows.length} résultat${rows.length>1?'s':''}</h2>`+
    (rows.length?rows.slice(0,80).map(r=>`<div class="sec" style="cursor:pointer" onclick="openDest('${r.d.code}')">${esc(r.d.label)} › <span class="cnt">${esc(r.p.c)}</span></div>`+poiRow(r.p)).join(''):'<div class="empty">Rien trouvé</div>')+`</div>`;
}

function render(){
  document.getElementById('jj').textContent = jjLabel();
  const p=view.page;
  if(p==='search') renderSearch();
  else if(p==='dest') renderDest();
  else if(p==='gear') renderGear();
  else if(p==='prep') renderPrep();
  else if(p==='catch') renderCatch();
  else if(p==='budget') renderBudget();
  else if(p==='vault') renderVault();
  else if(p==='qr') renderQR();
  else if(p==='save') renderSave();
  else renderHome();
}
function exportJSON(){
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({state,qrs},null,1)],{type:'application/json'})); a.download='carnet_japon_sauvegarde.json'; a.click();
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ const j=JSON.parse(r.result); if(j.state){ state=Object.assign(state,j.state); if(j.qrs) { qrs=j.qrs; saveQR(); } } else state=Object.assign(state,j); scheduleSave(); render(); flash('Importé ✓'); }catch(e){ flash('⚠ Fichier invalide'); } };
  r.readAsText(f);
}
if ('serviceWorker' in navigator && location.protocol==='https:') { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
(async()=>{ await loadState(); await loadQR(); render(); })();
</script>
